<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okoli Ifenna Augustine | Portfolio</title>
    <style>
        /* CSS VARIABLES */
        :root {
            --primary: #58a6ff;
            --secondary: #bc8cf2;
            --success: #238636;
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
            --border: #30363d;
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1d2127, #0d1117);
            color: #c9d1d9;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-ring {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            margin: 0 auto 20px;
            padding: 4px;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: #0d1117;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 2.2rem;
            color: white;
        }

        h1 { font-size: 1.6rem; margin: 10px 0; color: white; text-transform: uppercase; }
        .tagline { color: var(--primary); font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 30px; }

        .skill-item {
            background: #161b22;
            margin: 12px 0;
            padding: 16px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
        }

        .icon { margin-right: 15px; font-size: 1.3rem; }

        .cta-button {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            padding: 18px;
            border-radius: 14px;
            border: none;
            width: 100%;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(35, 134, 54, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-ring">
            <div class="avatar-placeholder">IA</div>
        </div>
        
        <h1>Okoli Ifenna Augustine</h1>
        <div class="tagline">Full-Stack Mobile Architect</div>

        <div class="skill-item"><span class="icon">💻</span><span>Python & Backend Logic</span></div>
        <div class="skill-item"><span class="icon">🎨</span><span>UI/UX & Branding</span></div>
        <div class="skill-item"><span class="icon">📱</span><span>Mobile-First Web Dev</span></div>

        <a href="mailto:Okoliifenna59@gmail.com?subject=Project%20Inquiry" style="text-decoration: none;">
            <button class="cta-button">LET'S WORK TOGETHER</button>
        </a>
    </div>

    <script>
        function welcomeUser() {
            const hours = new Date().getHours();
            let greeting;

            if (hours < 12) {
                greeting = "¡Buenos días! Welcome to my portfolio.";
            } else if (hours < 18) {
                greeting = "¡Buenas tardes! Hope you're having a productive day.";
            } else {
                greeting = "¡Buenas noches! Thanks for visiting my site.";
            }
            
            // This displays the message to the user
            alert(greeting);
        }

        // Run the function as soon as the page finishes loading
        window.onload = welcomeUser;
    </script>

</body>
</html>
