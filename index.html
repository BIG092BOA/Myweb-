<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ifenna | Resource Hub 2026</title>
    <style>
        :root {
            --primary: #58a6ff;
            --secondary: #bc8cf2;
            --success: #238636;
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.95);
            --border: #30363d;
            --text: #c9d1d9;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* NAVIGATION TABS */
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; overflow-x: auto; gap: 10px; }
        .tab-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; white-space: nowrap; padding: 8px; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .content-section { display: none; animation: fadeIn 0.5s ease; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* REUSABLE CARD STYLE */
        .item-card { background: #161b22; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: inherit; cursor: pointer; }
        .item-card:hover { border-color: var(--primary); background: #1c2128; transform: translateY(-2px); }
        
        .badge { font-size: 0.6rem; background: var(--success); color: white; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }

        .cta-button { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 14px 0 rgba(35, 134, 54, 0.39); }
    </style>
</head>
<body>

    <div class="container">
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('profile')">Profile</button>
            <button class="tab-btn" onclick="showTab('projects')">Projects</button>
            <button class="tab-btn" onclick="showTab('graphics')">Graphics</button>
            <button class="tab-btn" onclick="showTab('language')">Spanish</button>
        </nav>

        <div id="profile" class="content-section active">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="width:70px; height:70px; background:linear-gradient(45deg, var(--primary), var(--secondary)); border-radius:50%; margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.5rem; color:white;">IA</div>
                <h1>Ifenna Augustine</h1>
                <p style="color:var(--primary); font-size:0.8rem; letter-spacing:1.5px; font-weight:900;">MOBILE SYSTEMS ARCHITECT</p>
            </div>
            <p style="font-size: 0.85rem; text-align: center; color: #8b949e;">Integrated System Build: Structure + Bucle Logic (v2.1)</p>
        </div>

        <div id="projects" class="content-section">
            <h3 style="font-size:0.9rem; margin-bottom:15px;">Project Skeletons</h3>
            <div class="item-card" onclick="alert('Inquiry Sent: The Story')"><span>📖 The Story</span><span class="badge">Skel-v1</span></div>
            <div class="item-card" onclick="alert('Inquiry Sent: Linky')"><span>🔗 Linky</span><span class="badge">Skel-v1</span></div>
            <div class="item-card" onclick="alert('Inquiry Sent: Viz')"><span>📊 Viz</span><span class="badge">Skel-v1</span></div>
        </div>

        <div id="graphics" class="content-section">
            <h3 style="font-size:0.9rem; margin-bottom:10px;">Graphic Resources</h3>
            <a href="https://www.canva.com" target="_blank" class="item-card">
                <div><strong>Canva</strong><br><small>Layout & Branding</small></div>
                <span>🚀</span>
            </a>
            <a href="https://www.figma.com" target="_blank" class="item-card">
                <div><strong>Figma</strong><br><small>UI/UX Design</small></div>
                <span>🎨</span>
            </a>
        </div>

        <div id="language" class="content-section">
            <h3 style="font-size:0.9rem; margin-bottom:15px;">Smart Tech Dictionary</h3>
            <div id="dictionary-list">
                </div>
        </div>

        <button class="cta-button" onclick="window.location.href='mailto:Okoliifenna59@gmail.com'">DIRECT COLLABORATION</button>
    </div>

    <script>
        // CLASS 9 DATA ARRAY
        const techDictionary = [
            { es: "Desarrollador", en: "Developer" },
            { es: "Programación", en: "Programming" },
            { es: "Código", en: "Code" },
            { es: "Bucle", en: "Loop" },
            { es: "Estructura", en: "Structure" }
        ];

        // THE BUCLE (Loop Factory)
        function loadDictionary() {
            const listContainer = document.getElementById('dictionary-list');
            listContainer.innerHTML = ''; // Clear it first

            techDictionary.forEach(word => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => speak(word.es, word.en);
                card.innerHTML = `
                    <div><strong>${word.es}</strong><br><small>${word.en}</small></div>
                    <span>🔊</span>
                `;
                listContainer.appendChild(card);
            });
        }

        // TAB SWITCHING
        function showTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // SPANISH AUDIO
        function speak(word, meaning) {
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
            console.log(`Pronouncing: ${word}`);
        }

        // STARTUP
        window.onload = () => {
            loadDictionary(); // CLASS 9 MACHINE STARTS
            const h = new Date().getHours();
            if(h < 12) alert("¡Buenos días! System v2.1 Online.");
            else if(h < 18) alert("¡Buenas tardes! Systems Ready.");
            else alert("¡Buenas noches! Coding time.");
        };
    </script>
</body>
</html>
