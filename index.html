<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okoli Ifenna Augustine | Portfolio</title>
    <style>
        /* CSS VARIABLES - The "Paint Palette" */
        :root {
            --primary: #58a6ff;
            --secondary: #bc8cf2;
            --success: #238636;
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
            --border: #30363d;
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1d2127, #0d1117);
            color: #c9d1d9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* THE CARD - Glassmorphism Style */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PHOTO SECTION */
        .avatar-ring {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            margin: 0 auto 20px;
            padding: 4px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: #0d1117;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 2.2rem;
            color: white;
            text-shadow: 0 0 10px var(--primary);
        }

        h1 {
            font-size: 1.6rem;
            margin: 10px 0 5px;
            letter-spacing: -0.5px;
            color: white;
            text-transform: uppercase;
        }

        .tagline {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* SKILLS SECTION (Wireframe logic) */
        .section-label {
            text-align: left;
            font-size: 0.75rem;
            color: #8b949e;
            margin-bottom: 12px;
            font-weight: bold;
            padding-left: 5px;
        }

        .skill-item {
            background: #161b22;
            margin: 12px 0;
            padding: 16px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .skill-item:hover {
            border-color: var(--primary);
            background: #21262d;
            transform: scale(1.02);
        }

        .icon { 
            margin-right: 15px; 
            font-size: 1.3rem;
            background: #0d1117;
            padding: 8px;
            border-radius: 10px;
        }

        /* THE CLICKABLE BUTTON */
        .cta-link {
            text-decoration: none;
            display: block;
            margin-top: 30px;
        }

        .cta-button {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            padding: 18px;
            border-radius: 14px;
            border: none;
            width: 100%;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(35, 134, 54, 0.4);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(35, 134, 54, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }

        .cta-button:active { transform: scale(0.96); }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #484f58;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-ring">
            <div class="avatar-placeholder">IA</div>
        </div>
        
        <h1>Okoli Ifenna Augustine</h1>
        <div class="tagline">Full-Stack Mobile Architect</div>

        <div class="section-label">CORE SPECIALTIES</div>
        
        <div class="skill-item">
            <span class="icon">💻</span>
            <span>Python & Backend Logic</span>
        </div>

        <div class="skill-item">
            <span class="icon">🎨</span>
            <span>UI/UX & Branding (Canva)</span>
        </div>

        <div class="skill-item">
            <span class="icon">📱</span>
            <span>Mobile-First Web Development</span>
        </div>

        <a href="mailto:Okoliifenna59@gmail.com?subject=Project%20Inquiry" class="cta-link">
            <button class="cta-button">
                LET'S WORK TOGETHER
            </button>
        </a>

        <p class="footer">© 2026 • Verified Professional Developer</p>
