<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okoli Ifenna Augustine | Portfolio & Task Lab</title>
    <style>
        /* CSS VARIABLES - THE PAINT */
        :root {
            --primary: #58a6ff;
            --secondary: #bc8cf2;
            --success: #238636;
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
            --border: #30363d;
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1d2127, #0d1117);
            color: #c9d1d9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* THE CONTAINER */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* BRANDING */
        .avatar-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            margin: 0 auto 20px;
            padding: 4px;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        .avatar-placeholder {
            width: 100%; height: 100%;
            background: #0d1117;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 2rem; color: white;
        }

        h1 { font-size: 1.5rem; margin: 10px 0 5px; color: white; text-transform: uppercase; }
        .tagline { color: var(--primary); font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 25px; text-transform: uppercase; }

        /* INTERACTIVE TASK LIST */
        .section-label {
            text-align: left; font-size: 0.75rem; color: #8b949e;
            margin-bottom: 12px; font-weight: bold; text-transform: uppercase;
        }

        .task-list { margin-bottom: 25px; }

        .task-item {
            background: #161b22;
            margin: 10px 0;
            padding: 16px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .task-item:hover { border-color: var(--primary); transform: scale(1.02); }

        .task-item.completed {
            border-color: var(--success);
            background: rgba(35, 134, 54, 0.1);
        }
        
        .task-item.completed span { 
            text-decoration: line-through;
            color: #8b949e;
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .completed .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* THE PULSING BUTTON */
        .cta-button {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            padding: 18px;
            border-radius: 14px;
            border: none;
            width: 100%;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(35, 134, 54, 0.3);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(35, 134, 54, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-ring">
            <div class="avatar-placeholder">IA</div>
        </div>
        
        <h1>Okoli Ifenna Augustine</h1>
        <div class="tagline">Mobile Systems Architect</div>

        <div class="section-label">Dev Learning Path</div>
        
        <div class="task-list">
            <div class="task-item" onclick="toggleTask(this)">
                <span>Python & HTML Structure</span>
                <div class="status-dot"></div>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <span>CSS Design & Branding</span>
                <div class="status-dot"></div>
            </div>
            <div class="task-item" onclick="toggleTask(this)">
                <span>JS Logic & Interactivity</span>
                <div class="status-dot"></div>
            </div>
        </div>

        <a href="mailto:Okoliifenna59@gmail.com?subject=Project%20Inquiry" style="text-decoration: none;">
            <button class="cta-button" id="mainBtn">LET'S WORK TOGETHER</button>
        </a>
    </div>

    <script>
        // 1. Time-Based Spanish Greeting
        window.onload = () => {
            const currentHour = new Date().getHours();
            let greetingMsg;

            if (currentHour < 12) {
                greetingMsg = "¡Buenos días! The morning is for building.";
            } else if (currentHour < 18) {
                greetingMsg = "¡Buenas tardes! Your project is coming to life.";
            } else {
                greetingMsg = "¡Buenas noches! Perfect time for deep focus.";
            }
            
            alert(greetingMsg);
        };

        // 2. Task Completion Logic
        function toggleTask(element) {
            element.classList.toggle('completed');
            // Check if all are done?
            console.log("Trust built: Task status updated.");
        }

        // 3. Button Visual Feedback
        document.getElementById('mainBtn').onclick = function() {
            this.innerText = "OPENING GMAIL...";
            this.style.background = "#1d2127";
        };
    </script>

</body>
</html>
